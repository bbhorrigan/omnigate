{{/*
  Generate secrets only when no existingSecret is specified.
  When existingSecret is provided, the user manages secrets externally.
*/}}

{{- if not .Values.postgresql.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnigate.fullname" . }}-postgresql
  labels:
    {{- include "omnigate.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_USER: {{ .Values.postgresql.username | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.password | b64enc | quote }}
---
{{- end }}

{{- if not .Values.redis.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnigate.fullname" . }}-redis
  labels:
    {{- include "omnigate.labels" . | nindent 4 }}
type: Opaque
data:
  REDIS_URL: {{ .Values.redis.url | b64enc | quote }}
---
{{- end }}

{{- if not .Values.jwt.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnigate.fullname" . }}-jwt
  labels:
    {{- include "omnigate.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ .Values.jwt.secret | b64enc | quote }}
---
{{- end }}

{{- if not .Values.encryption.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnigate.fullname" . }}-encryption
  labels:
    {{- include "omnigate.labels" . | nindent 4 }}
type: Opaque
data:
  ENCRYPTION_KEY: {{ .Values.encryption.key | b64enc | quote }}
---
{{- end }}

{{- if not .Values.github.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnigate.fullname" . }}-github
  labels:
    {{- include "omnigate.labels" . | nindent 4 }}
type: Opaque
data:
  GITHUB_CLIENT_ID: {{ .Values.github.clientId | b64enc | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.github.clientSecret | b64enc | quote }}
---
{{- end }}

{{- if and .Values.oidc.enabled (not .Values.oidc.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnigate.fullname" . }}-oidc
  labels:
    {{- include "omnigate.labels" . | nindent 4 }}
type: Opaque
data:
  OIDC_CLIENT_ID: {{ .Values.oidc.clientId | b64enc | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.oidc.clientSecret | b64enc | quote }}
---
{{- end }}

{{- if and .Values.snowflake.enabled (not .Values.snowflake.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnigate.fullname" . }}-snowflake
  labels:
    {{- include "omnigate.labels" . | nindent 4 }}
type: Opaque
data:
  SNOWFLAKE_PRIVATE_KEY: {{ .Values.snowflake.username | b64enc | quote }}
---
{{- end }}

{{- if and .Values.azure.enabled (not .Values.azure.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnigate.fullname" . }}-azure
  labels:
    {{- include "omnigate.labels" . | nindent 4 }}
type: Opaque
data:
  AZURE_CLIENT_SECRET: {{ .Values.azure.clientId | b64enc | quote }}
---
{{- end }}

{{- if and .Values.gcp.enabled (not .Values.gcp.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnigate.fullname" . }}-gcp
  labels:
    {{- include "omnigate.labels" . | nindent 4 }}
type: Opaque
data:
  GCP_SERVICE_ACCOUNT_KEY: {{ .Values.gcp.projectId | b64enc | quote }}
---
{{- end }}

{{- if and .Values.databricks.enabled (not .Values.databricks.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnigate.fullname" . }}-databricks
  labels:
    {{- include "omnigate.labels" . | nindent 4 }}
type: Opaque
data:
  DATABRICKS_TOKEN: {{ .Values.databricks.host | b64enc | quote }}
{{- end }}
